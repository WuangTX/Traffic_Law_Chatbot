<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trợ Lý Luật Giao Thông</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" id="newChatBtn" title="Cuộc trò chuyện mới">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    <span>Chat mới</span>
                </button>
            </div>
            <div class="sidebar-content" id="conversationList">
                <!-- Conversation list populated by JS -->
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <div class="chat-header">
                <button class="mobile-menu-btn" id="mobileMenuBtn" title="Menu">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <button class="toggle-sidebar-btn" id="toggleSidebarBtn" title="Thu gọn sidebar">
                    <svg class="icon-collapse" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="9" y1="3" x2="9" y2="21"></line>
                    </svg>
                    <svg class="icon-expand" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="15" y1="3" x2="15" y2="21"></line>
                    </svg>
                </button>
                <h2 class="chat-title" id="chatTitle">Trợ Lý Luật Giao Thông</h2>
            </div>

            <div class="chat-messages" id="chatMessages">
                <!-- Welcome screen (shown when no messages) -->
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 22s-8-4.5-8-11.8V5.2L12 3l8 2.2v5c0 7.3-8 11.8-8 11.8z"/>
                            <path d="M9 12l2 2 4-4"/>
                        </svg>
                    </div>
                    <h1 class="welcome-title">Trợ Lý Luật Giao Thông</h1>
                    <p class="welcome-subtitle">
                        Hỏi về luật giao thông, mức phạt, biển báo và các quy định mới nhất
                    </p>
                    <div class="suggestion-grid" id="suggestionGrid">
                        <button class="suggestion-card" data-query="Xe máy vượt đèn đỏ bị phạt bao nhiêu tiền?">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                            </svg>
                            <span>Xe máy vượt đèn đỏ bị phạt bao nhiêu?</span>
                        </button>
                        <button class="suggestion-card" data-query="Nồng độ cồn bao nhiêu thì bị phạt?">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M8 2h8l2 20H6L8 2z"/><line x1="12" y1="8" x2="12" y2="12"/>
                            </svg>
                            <span>Nồng độ cồn bao nhiêu thì bị phạt?</span>
                        </button>
                        <button class="suggestion-card" data-query="Biển báo P.101 có ý nghĩa gì?">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/><line x1="12" y1="22" x2="12" y2="15.5"/><polyline points="22 8.5 12 15.5 2 8.5"/>
                            </svg>
                            <span>Biển báo P.101 có ý nghĩa gì?</span>
                        </button>
                        <button class="suggestion-card" data-query="Lỗi chạy quá tốc độ bị phạt thế nào?">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                            </svg>
                            <span>Lỗi chạy quá tốc độ bị phạt thế nào?</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="chat-input-area">
                <div class="input-wrapper">
                    <textarea
                        id="chatInput"
                        class="chat-input"
                        placeholder="Hỏi về luật giao thông..."
                        rows="1"
                        autofocus
                    ></textarea>
                    <button class="send-btn" id="sendBtn" title="Gửi">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
                <p class="disclaimer">
                    Trợ lý AI có thể mắc sai lỗi. Hãy kiểm tra thông tin quan trọng.
                </p>
            </div>
        </main>
    </div>

    <!-- Hidden template for AI message -->
    <template id="messageAiTemplate">
        <div class="message message-ai">
            <div class="message-avatar">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s-8-4.5-8-11.8V5.2L12 3l8 2.2v5c0 7.3-8 11.8-8 11.8z"/>
                    <path d="M9 12l2 2 4-4"/>
                </svg>
            </div>
            <div class="message-content">
                <div class="message-text markdown-body"></div>
                <div class="message-extracted"></div>
                <div class="message-signs"></div>
                <div class="message-citations"></div>
                <div class="message-actions">
                    <button class="action-btn copy-btn" title="Sao chép">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </template>

    <!-- Hidden template for user message -->
    <template id="messageUserTemplate">
        <div class="message message-user">
            <div class="message-content">
                <div class="message-text"></div>
            </div>
            <div class="message-avatar user-avatar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </div>
        </div>
    </template>

    <!-- Hidden template for sign card -->
    <template id="signCardTemplate">
        <div class="sign-card">
            <div class="sign-image-wrapper">
                <img class="sign-image" alt="" loading="lazy">
                <div class="sign-image-fallback" style="display:none;">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
                </div>
            </div>
            <div class="sign-info">
                <div class="sign-name"></div>
                <div class="sign-category"></div>
                <div class="sign-description"></div>
            </div>
        </div>
    </template>

    <!-- Hidden template for citation -->
    <template id="citationTemplate">
        <div class="citation">
            <div class="citation-header">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                </svg>
                <span class="citation-source"></span>
                <span class="citation-score"></span>
            </div>
            <div class="citation-text"></div>
        </div>
    </template>

    <script src="/js/chat.js"></script>
</body>
</html>
